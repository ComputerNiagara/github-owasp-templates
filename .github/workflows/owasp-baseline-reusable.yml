# =============================================================================
# OWASP Baseline Security Scan — Reusable Workflow
# =============================================================================
# Repo:  your-username/github-owasp-templates
# Path:  .github/workflows/owasp-baseline-reusable.yml
#
# Scan:  ZAP Baseline (passive DAST only)
# Safe:  Passive only — no attack payloads, no side effects, no data risk
# Time:  ~5–10 minutes
#
# Note:  Dependency scanning is handled by GHAS Dependabot — always on,
#        no workflow needed. Enable per repo via a dependabot.yml file.
#
# Reference this workflow from your app repo:
#   uses: your-username/github-owasp-templates/.github/workflows/owasp-baseline-reusable.yml@v1
# =============================================================================

name: OWASP Baseline Scan (Reusable)

on:
  workflow_call:
    inputs:
      target_url:
        description: 'URL of the deployed application to scan'
        required: true
        type: string
      environment:
        description: 'Environment label (e.g. dev, staging, uat, prod-scan)'
        required: true
        type: string
        default: 'dev'
      runner:
        description: 'Runner label — ubuntu-latest or self-hosted label for internal apps'
        required: false
        type: string
        default: 'ubuntu-latest'
      fail_on_warn:
        description: 'Fail the workflow if ZAP finds warnings (not just errors)'
        required: false
        type: boolean
        default: false
    secrets:
      ZAP_AUTH_HEADER_VALUE:
        description: 'Optional Bearer token / API key to authenticate ZAP against the target'
        required: false

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  # ============================================================
  # JOB 1: Preflight — Verify target is reachable
  # Fails fast with a clear message if the runner cannot reach
  # the target URL, rather than letting ZAP run and timeout.
  #
  # Public apps:   use runner: 'ubuntu-latest'
  # Internal apps: use a self-hosted runner with network access
  #                to the target URL and Docker installed
  # ============================================================
  preflight:
    name: Preflight Check [${{ inputs.environment }}]
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Verify Target is Reachable
        run: |
          echo "Checking connectivity to: ${{ inputs.target_url }}"
          echo "Runner: ${{ inputs.runner }}"
          echo ""

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --connect-timeout 10 \
            -L \
            "${{ inputs.target_url }}" || echo "000")

          if [ "$HTTP_STATUS" = "000" ]; then
            echo "❌ Cannot reach ${{ inputs.target_url }} from this runner."
            echo ""
            echo "Possible causes:"
            echo "  - The app is not running or not yet deployed"
            echo "  - The URL is incorrect"
            echo "  - The app is internal/behind a firewall and requires a"
            echo "    self-hosted runner with network access"
            echo ""
            echo "If this is an internal app:"
            echo "  Set runner: 'your-self-hosted-label' in your workflow"
            echo "  The runner must have Docker installed and network access"
            echo "  to ${{ inputs.target_url }}"
            exit 1
          fi

          echo "✅ Target reachable — HTTP status: $HTTP_STATUS"
          echo "Proceeding with ZAP scan..."

  # ============================================================
  # JOB 2: ZAP Baseline Scan — Passive DAST
  # Spiders the app and observes responses only.
  # No attack payloads are sent at any point.
  # ============================================================
  zap-baseline:
    name: ZAP Baseline [${{ inputs.environment }}]
    needs: [preflight]
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix ZAP workspace permissions
        run: |
          chmod 777 ${{ github.workspace }}

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: ${{ inputs.fail_on_warn }}
          issue_title: '[${{ inputs.environment }}] ZAP Baseline Findings'
          artifact_name: 'zap-baseline-report'
          allow_issue_writing: true
          # NOTE: cmd_options '-a' is intentionally omitted — that flag enables
          # active scanning. Active scanning belongs in owasp-active-reusable.yml.
          #
          # Uncomment to inject an auth header if your app requires authentication:
          # docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          # cmd_options: >-
          #   -z "-config replacer.full_list(0).description=auth
          #   -config replacer.full_list(0).enabled=true
          #   -config replacer.full_list(0).matchtype=REQ_HEADER
          #   -config replacer.full_list(0).matchstr=Authorization
          #   -config replacer.full_list(0).replacement=Bearer ${{ secrets.ZAP_AUTH_HEADER_VALUE }}"

  # ============================================================
  # JOB 3: Summary
  # ============================================================
  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [preflight, zap-baseline]
    if: always()
    steps:
      - name: Write Job Summary
        run: |
          echo "## 🔒 OWASP Baseline Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preflight (target reachable) | ${{ needs.preflight.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP Baseline (Passive DAST) | ${{ needs.zap-baseline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`${{ inputs.runner }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
