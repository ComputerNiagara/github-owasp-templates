# =============================================================================
# Update Deployment Status — Reusable Workflow
# =============================================================================
# Repo:  your-username/github-owasp-templates
# Path:  .github/workflows/update-deployment.yml
#
# Purpose: Updates an existing GitHub Deployment record with success or failure
#          at the END of your deploy job.
#
#          On success — sets environment_url so the OWASP baseline scan knows
#          what URL to scan. GitHub fires the deployment_status event which
#          triggers owasp-baseline-scan.yml automatically.
#
#          On failure — marks deployment as failed. ZAP does NOT fire.
#
# This is step 2 of 2. See create-deployment.yml for step 1.
#
# Reference this workflow from your deploy workflow:
#   uses: your-username/github-owasp-templates/.github/workflows/update-deployment.yml@v1
# =============================================================================

name: Update Deployment Status (Reusable)

on:
  workflow_call:
    inputs:
      deployment_id:
        description: 'Deployment ID returned by create-deployment.yml'
        required: true
        type: string
      environment:
        description: 'Environment being deployed to (e.g. dev, ist, uat)'
        required: true
        type: string
      status:
        description: 'Result of the deployment: success or failure'
        required: true
        type: string
      environment_url:
        description: >
          Live URL of the deployed app — this is what ZAP will scan.
          Only required when status is success.
          Use the fixed URL for your environment.
          e.g. https://myapp-dev.yourcompany.com
        required: false
        type: string
        default: ''

permissions:
  contents: read
  deployments: write

jobs:
  update:
    name: Mark Deployment [${{ inputs.environment }}] → ${{ inputs.status }}
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # Success — includes environment_url so ZAP knows what to scan
      # GitHub fires deployment_status event after this step
      # ------------------------------------------------------------------
      - name: Mark Deployment Successful
        if: inputs.status == 'success'
        run: |
          if [ -z "${{ inputs.environment_url }}" ]; then
            echo "⚠️  environment_url is empty — ZAP will not be able to determine the scan target."
            echo "    Set environment_url to your deployed app URL for automatic ZAP triggering."
          fi

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ inputs.deployment_id }}/statuses \
            -d '{
              "state": "success",
              "environment": "${{ inputs.environment }}",
              "environment_url": "${{ inputs.environment_url }}",
              "description": "Deployment to ${{ inputs.environment }} succeeded"
            }'

          echo "✅ Deployment ${{ inputs.deployment_id }} marked as success"
          echo "🔍 ZAP will scan: ${{ inputs.environment_url }}"

      # ------------------------------------------------------------------
      # Failure — ZAP does NOT fire on failed deployments
      # ------------------------------------------------------------------
      - name: Mark Deployment Failed
        if: inputs.status == 'failure'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ inputs.deployment_id }}/statuses \
            -d '{
              "state": "failure",
              "environment": "${{ inputs.environment }}",
              "description": "Deployment to ${{ inputs.environment }} failed"
            }'

          echo "❌ Deployment ${{ inputs.deployment_id }} marked as failure"
          echo "ℹ️  ZAP scan will not trigger on failed deployments"
