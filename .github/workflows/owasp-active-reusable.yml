# =============================================================================
# OWASP Active Security Scan — Reusable Workflow
# =============================================================================
# Repo:  your-username/github-owasp-templates
# Path:  .github/workflows/owasp-active-reusable.yml
#
# Scans: ZAP Full Scan (web app active DAST)
#        ZAP API Scan  (API active DAST — requires OpenAPI spec)
#
# ⚠️  Both scans send REAL ATTACK PAYLOADS. They will:
#       - Send SQL injection, XSS, path traversal, and other attack vectors
#       - Potentially create, modify, or delete data in the target environment
#       - Generate high traffic volume and log noise
#       - Potentially crash unstable environments
#       - Trigger rate limiting or account lockout policies
#       - Take 30–90+ minutes depending on app/API size
#
# Requirements BEFORE running:
#   1. Target MUST be an isolated environment with throwaway data
#   2. Inform the team owning the target environment in advance
#   3. Approval from the 'security-approved' environment is required
#   4. NEVER point this at DEV, IST, UAT, or production
#
# Reference this workflow from your app repo:
#   uses: your-username/github-owasp-templates/.github/workflows/owasp-active-reusable.yml@v1
# =============================================================================

name: OWASP Active Scan (Reusable)

on:
  workflow_call:
    inputs:
      scan_type:
        description: 'Scan to run: full-scan (web app), api-scan (REST/GraphQL), or both'
        required: true
        type: string
        default: 'full-scan'
      target_url:
        description: '⚠️ URL of the ISOLATED environment — never DEV/IST/UAT/prod'
        required: true
        type: string
      openapi_spec_url:
        description: 'URL or path to OpenAPI/Swagger spec — required for api-scan or both'
        required: false
        type: string
        default: ''
      environment:
        description: 'Environment label for this scan run'
        required: true
        type: string
        default: 'scan-isolated'
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      fail_on_warn:
        description: 'Fail the workflow if ZAP finds warnings'
        required: false
        type: boolean
        default: true
    secrets:
      ZAP_AUTH_HEADER_VALUE:
        description: 'Optional Bearer token / API key to authenticate ZAP against the target'
        required: false

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  # ============================================================
  # APPROVAL GATE
  # References the 'security-approved' GitHub Environment.
  # Scan will not proceed until a required reviewer approves.
  #
  # Setup: Repo → Settings → Environments → security-approved
  #        → Required reviewers → add security team members
  # ============================================================
  await-approval:
    name: Awaiting Approval
    runs-on: ubuntu-latest
    environment: security-approved
    steps:
      - name: Approval Granted
        run: |
          echo "✅ Active scan approved."
          echo "Scan type:   ${{ inputs.scan_type }}"
          echo "Target:      ${{ inputs.target_url }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Approved by: ${{ github.actor }}"
          echo "Time (UTC):  $(date -u)"

  # ============================================================
  # PREFLIGHT — Verify target is reachable after approval
  # Runs on the specified runner so internal apps are covered
  # ============================================================
  preflight:
    name: Preflight Check [${{ inputs.environment }}]
    needs: await-approval
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Verify Target is Reachable
        run: |
          echo "Checking connectivity to: ${{ inputs.target_url }}"
          echo "Runner: ${{ inputs.runner }}"
          echo ""

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --connect-timeout 10 \
            -L \
            "${{ inputs.target_url }}" || echo "000")

          if [ "$HTTP_STATUS" = "000" ]; then
            echo "❌ Cannot reach ${{ inputs.target_url }} from this runner."
            echo ""
            echo "Possible causes:"
            echo "  - The isolated environment is not running"
            echo "  - The URL is incorrect"
            echo "  - Network access issue from this runner"
            exit 1
          fi

          echo "✅ Target reachable — HTTP status: $HTTP_STATUS"
          echo "⚠️  Proceeding with ACTIVE scan — attack payloads will be sent"

  # ============================================================
  # ZAP Full Scan — Web App Active DAST
  # Runs when scan_type is 'full-scan' or 'both'
  # ============================================================
  zap-full-scan:
    name: ZAP Full Scan [${{ inputs.environment }}]
    needs: [preflight]
    if: inputs.scan_type == 'full-scan' || inputs.scan_type == 'both'
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ⚠️ Active Scan Starting
        run: |
          echo "⚠️  ZAP FULL SCAN STARTING — ATTACK PAYLOADS WILL BE SENT"
          echo "Target:      ${{ inputs.target_url }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Time (UTC):  $(date -u)"

      - name: Fix ZAP workspace permissions
        run: chmod 777 ${{ github.workspace }}

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ inputs.target_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: ${{ inputs.fail_on_warn }}
          issue_title: '[${{ inputs.environment }}] ZAP Full Scan Findings'
          allow_issue_writing: true
          cmd_options: '-a'

  # ============================================================
  # ZAP API Scan — API Active DAST
  # Runs when scan_type is 'api-scan' or 'both'
  # ============================================================
  zap-api-scan:
    name: ZAP API Scan [${{ inputs.environment }}]
    needs: [preflight]
    if: inputs.scan_type == 'api-scan' || inputs.scan_type == 'both'
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate OpenAPI Spec Provided
        run: |
          if [ -z "${{ inputs.openapi_spec_url }}" ]; then
            echo "❌ openapi_spec_url is required for api-scan."
            exit 1
          fi

      - name: ⚠️ API Scan Starting
        run: |
          echo "⚠️  ZAP API SCAN STARTING — ATTACK PAYLOADS WILL BE SENT"
          echo "Target:      ${{ inputs.target_url }}"
          echo "Spec:        ${{ inputs.openapi_spec_url }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Time (UTC):  $(date -u)"

      - name: Fix ZAP workspace permissions
        run: chmod 777 ${{ github.workspace }}

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: ${{ inputs.openapi_spec_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: ${{ inputs.fail_on_warn }}
          issue_title: '[${{ inputs.environment }}] ZAP API Scan Findings'
          allow_issue_writing: true
          format: openapi

  # ============================================================
  # Summary
  # ============================================================
  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [preflight, zap-full-scan, zap-api-scan]
    if: always()
    steps:
      - name: Write Job Summary
        run: |
          echo "## ⚠️ OWASP Active Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Active scan — real attack payloads were sent to the target." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP Full Scan | ${{ needs.zap-full-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP API Scan  | ${{ needs.zap-api-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan type:** \`${{ inputs.scan_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Approved by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`${{ inputs.runner }}\`" >> $GITHUB_STEP_SUMMARY
